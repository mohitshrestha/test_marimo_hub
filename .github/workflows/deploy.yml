# ==========================================================
# GitHub Actions Workflow for Building and Deploying Marimo Notebooks to GitHub Pages
# ----------------------------------------------------------
# This workflow runs on pushes to the main branch (or manually)
# It builds the static site from Marimo notebooks and deploys it to GitHub Pages.
#
# Steps include:
# - System setup (install dependencies, setup Python environment, and test)
# - Build site (compile notebooks, create thumbnails, etc.)
# - Deploy to GitHub Pages
# ==========================================================

name: Deploy to GitHub Pages

# Defines when the workflow will run
on:
  push:
    branches: ['main']  # Trigger on pushes to main branch
  workflow_dispatch:    # Allow manual triggering from the GitHub UI

# Concurrency settings to manage multiple workflow runs
concurrency:
  group: 'pages'             # Only one workflow in the 'pages' group can run at a time
  cancel-in-progress: false  # Don't cancel in-progress runs when a new one is triggered

# ------------------------------------------------------
# Workflow-wide environment variables
# ------------------------------------------------------
env:
  # Force all JavaScript-based actions to run Node.js 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Additional workflow-wide env variables can be added here

jobs:
  # ------------------------------------------------------
  # System setup, linting, and testing
  # ------------------------------------------------------
  system_setup:
    # Use the latest stable Ubuntu runner
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------
      # 1. Checkout the repository code
      # ------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v6
        # Ensures the workflow has access to the latest code

      # ------------------------------------------------------
      # 2. Install UV (Python package and project manager)
      # ------------------------------------------------------
      - name: Install UV
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
        # Caches UV for faster future runs and repeatable environment setup

      # Check if `uv` is installed and its version
      - name: Check UV installation
        run: |
          uv --version     # Verify that UV is installed
          which uv         # Verify that UV is in the PATH

      # ------------------------------------------------------
      # 3. Set up Python environment via UV
      # ------------------------------------------------------
      - name: Set up Python environment
        run: uv python install
        # Ensures correct Python version is installed

      # ------------------------------------------------------
      # 4. Install project and all dependencies
      # ------------------------------------------------------
      - name: Install project dependencies
        run: uv sync --all-extras --dev
        # --all-extras: installs optional features
        # --dev: installs development dependencies

  # ------------------------------------------------------
  # After system setup is complete, we can build the site in a separate job
  # ------------------------------------------------------
  build_site:
    needs: system_setup  # This job depends on the system setup job completing successfully
    # Use the latest stable Ubuntu runner
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------
      # 1. Checkout the repository code
      # ------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v6
        # Ensures the workflow has access to the latest code

      # ------------------------------------------------------
      # 2. Install UV (Python package and project manager)
      # ------------------------------------------------------
      - name: Install UV
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
        # Caches UV for faster future runs and repeatable environment setup

      # Check if `uv` is installed and its version
      - name: Check UV installation
        run: |
          uv --version     # Verify that UV is installed
          which uv         # Verify that UV is in the PATH

      # ------------------------------------------------------
      # 3. Run the build script to export notebooks to WebAssembly
      # ------------------------------------------------------
      - name: 🛠️ Export notebooks
        run: |
          # Run our build script that handles:
          # - Draft/Publish/Archive workflow
          # - Nested folder navigation
          # - Automatic thumbnails
          # - Notebook HTML/WASM export
          uv run scripts/build_site.py build # This script exports all notebooks to the _site directory

          # Optional: Display the output tree for verification
          tree _site  # Display the exported files
    
      # ------------------------------------------------------
      # 4. Upload the generated site as an artifact for the deploy job
      # ------------------------------------------------------
      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site  # Directory containing the built site

  # ------------------------------------------------------
  # The deploy job publishes the built site to GitHub Pages
  # ------------------------------------------------------
  deploy:
    needs: build_site  # This job depends on the build_site job completing successfully
    runs-on: ubuntu-latest
    permissions:
      pages: write      # Permission to deploy to Pages
      id-token: write   # Permission to verify the deployment

    # Configure the deployment environment
    environment:
      name: github-pages                             # Deploy to the github-pages environment
      url: ${{ steps.deployment.outputs.page_url }}  # Use the URL from the deployment step

    steps:
      # ------------------------------------------------------
      # 1. Deploy the site to GitHub Pages using the official action
      # ------------------------------------------------------
      - name: 🚀 Deploy to GitHub Pages
        id: deployment                 # ID used to reference this step's outputs
        uses: actions/deploy-pages@v4  # GitHub's official Pages deployment action