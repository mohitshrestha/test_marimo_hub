<article class="project-card group relative flex flex-col border border-slate-200 rounded-xl overflow-hidden hover:border-blue-500 hover:shadow-2xl hover:shadow-blue-500/10 transition-all duration-300 bg-white cursor-pointer"
         data-category="{{ item.category }}" 
         data-featured="{{ item.meta.featured }}" 
         data-title="{{ item.meta.title }}" 
         data-date="{{ item.meta.date }}"
         data-search="{{ item.meta.title.lower() }} {{ item.meta.tags | join(' ') | lower }}">
    
    <a href="{{ item.url }}" target="_blank" class="absolute inset-0 z-10 focus:outline-none">
        <span class="sr-only">Open {{ item.meta.title }}</span>
    </a>

    <div class="aspect-video bg-slate-50 flex items-center justify-center border-b border-slate-100 relative overflow-hidden">
        {% if item.meta.thumbnail %}
            <img src="{{ item.meta.thumbnail }}" 
                 alt="{{ item.meta.title }}" 
                 class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
        {% else %}
            <div class="flex flex-col items-center gap-2 text-slate-300 group-hover:text-blue-400 transition-colors">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                </svg>
                <span class="text-[10px] font-bold uppercase tracking-widest text-center">Interactive App</span>
            </div>
        {% endif %}
        
        <div class="absolute top-2 left-2 flex flex-col gap-1 z-20">
            {% if item.meta.featured %}
                <span class="bg-blue-600 text-white text-[8px] font-black px-2 py-0.5 rounded shadow-lg uppercase">Featured</span>
            {% endif %}
            <span class="bg-slate-900/80 backdrop-blur-sm text-white text-[8px] font-bold px-2 py-0.5 rounded uppercase">{{ item.category }}</span>
        </div>

        <div class="absolute top-2 right-2 z-50 flex gap-2 opacity-0 group-hover:opacity-100 transform translate-y-[-4px] group-hover:translate-y-0 transition-all duration-300">
            <button onclick="shareToLinkedIn(event, '{{ base_url }}/{{ item.url.lstrip('/') }}')"
                    class="p-2 bg-white hover:bg-blue-600 hover:text-white text-slate-600 rounded-full shadow-lg transition-all duration-200 border border-slate-100 cursor-pointer"
                    title="Share on LinkedIn">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
                </svg>
            </button>
            
            <button onclick="handleCopy(event, '{{ base_url }}/{{ item.url.lstrip('/') }}', this)"
                    class="p-2 bg-white hover:bg-emerald-500 hover:text-white text-slate-600 rounded-full shadow-lg transition-all duration-200 border border-slate-100 cursor-pointer"
                    title="Copy Link">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path>
                </svg>
            </button>
        </div>
    </div>

    <div class="p-5 flex flex-col flex-grow">
        <div class="flex flex-wrap gap-1.5 mb-3 relative z-20">
            {% for tag in item.meta.tags %}
                <span class="text-[9px] font-bold uppercase tracking-tight text-slate-500 bg-slate-100 px-2 py-0.5 rounded-md">{{ tag }}</span>
            {% endfor %}
        </div>
        
        <h3 class="text-base font-bold text-slate-900 leading-tight mb-2 group-hover:text-blue-600 transition-colors">
            {{ item.meta.title }}
        </h3>
        
        <p class="text-xs text-slate-500 line-clamp-3 leading-relaxed">
            {{ item.meta.description }}
        </p>
    </div>
</article>
